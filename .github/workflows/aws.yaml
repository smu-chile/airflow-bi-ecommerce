on:
  push:
    branches: [develop,staging,master]

name: Deploy to Amazon ECS

jobs:
  Scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: UnicornGlobal/trufflehog-actions-scan@master
        with:
          branch: ${{ github.head_ref }}

  Scan-PR:
    name: Scan PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          BUILD_NUMBER: pr-${{ github.run_number }}

  Deploy-Develop:
    name: Deploy-Develop
    env:
      IMAGE_NAME: ${{ github.repository }}:dev-${{ github.run_number }}
    runs-on: ubuntu-latest
    needs: Scan
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          BUILD_NUMBER: dev-${{ github.run_number }}
          BRANCH_NAME: develop

      # - name: Build the image
      #   run: docker build -f Dockerfile.dev -t $IMAGE_NAME .

      # - name: Prisma Cloud image scan
      #   id: scan
      #   uses: PaloAltoNetworks/prisma-cloud-scan@v1
      #   with:
      #     pcc_console_url: ${{ secrets.PCC_CONSOLE_URL }}
      #     pcc_user: ${{ secrets.PCC_USER }}
      #     pcc_pass: ${{ secrets.PCC_PASS }}
      #     image_name: ${{ env.IMAGE_NAME }}

      - name: Build the container image
        run: docker build . --file Dockerfile --tag localbuild/testimage:latest
      - uses: anchore/scan-action@v2.0.4
        with:
          image: "localbuild/testimage:latest"
          grype-version: "0.13.0"
          debug: false
          fail-build: false
          severity-cutoff: High

      - uses: smu-chile/aws-ecr-policy-action@master
        with:
          access_key_id: ${{ secrets.AWS_ECR_ACCESS_KEY }}
          secret_access_key: ${{ secrets.AWS_ECR_SECRET_KEY }}
          ecr_registry: ${{ secrets.AWS_ECR_REGISTRY }}
          repo: ${{ github.repository }}
          region: us-east-1
          tags: dev-${{ github.run_number }}
          dockerfile: Dockerfile
          ecr_policies: "dev:5 prod:5"

  Deploy-Staging:
    env:
      IMAGE_NAME: ${{ github.repository }}:stg-${{ github.run_number }}
    name: Deploy-Staging
    runs-on: ubuntu-latest
    needs: Scan
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          BUILD_NUMBER: stg-${{ github.run_number }}
          BRANCH_NAME: staging

      # - name: Build the image
      #   run: docker build -f Dockerfile.dev -t $IMAGE_NAME .

      # - name: Prisma Cloud image scan
      #   id: scan
      #   uses: PaloAltoNetworks/prisma-cloud-scan@v1
      #   with:
      #     pcc_console_url: ${{ secrets.PCC_CONSOLE_URL }}
      #     pcc_user: ${{ secrets.PCC_USER }}
      #     pcc_pass: ${{ secrets.PCC_PASS }}
      #     image_name: ${{ env.IMAGE_NAME }}

      - name: Build the container image
        run: docker build . --file Dockerfile.dev --tag localbuild/testimage:latest
      - uses: anchore/scan-action@v2.0.4
        with:
          image: "localbuild/testimage:latest"
          grype-version: "0.13.0"
          debug: false
          fail-build: false
          severity-cutoff: Medium

      - uses: smu-chile/aws-ecr-policy-action@master
        with:
          access_key_id: ${{ secrets.AWS_ECR_ACCESS_KEY }}
          secret_access_key: ${{ secrets.AWS_ECR_SECRET_KEY }}
          ecr_registry: ${{ secrets.AWS_ECR_REGISTRY }}
          repo: ${{ github.repository }}
          region: us-east-1
          tags: stg-${{ github.run_number }}
          dockerfile: Dockerfile.dev
          ecr_policies: "dev:5 prod:5"

  Deploy-Prod:
    name: Deploy-Prod
    env:
      IMAGE_NAME: ${{ github.repository }}:prod-${{ github.run_number }}
    runs-on: ubuntu-latest
    needs: Scan
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          BUILD_NUMBER: prod-${{ github.run_number }}
          BRANCH_NAME: master

      # - name: Build the image
      #   run: docker build -f Dockerfile.prod -t $IMAGE_NAME .

      # - name: Prisma Cloud image scan
      #   id: scan
      #   uses: PaloAltoNetworks/prisma-cloud-scan@v1
      #   with:
      #     pcc_console_url: ${{ secrets.PCC_CONSOLE_URL }}
      #     pcc_user: ${{ secrets.PCC_USER }}
      #     pcc_pass: ${{ secrets.PCC_PASS }}
      #     image_name: ${{ env.IMAGE_NAME }}

      - name: Build the container image
        run: docker build . --file Dockerfile.prod --tag localbuild/testimage:latest

      - uses: anchore/scan-action@v2.0.4
        with:
          image: "localbuild/testimage:latest"
          grype-version: "0.13.0"
          debug: false
          fail-build: false
          severity-cutoff: Medium

      - uses: smu-chile/aws-ecr-policy-action@master
        with:
          access_key_id: ${{ secrets.AWS_ECR_ACCESS_KEY }}
          secret_access_key: ${{ secrets.AWS_ECR_SECRET_KEY }}
          ecr_registry: ${{ secrets.AWS_ECR_REGISTRY }}
          repo: ${{ github.repository }}
          region: us-east-1
          tags: prod-${{ github.run_number }}
          dockerfile: Dockerfile.prod
          ecr_policies: "dev:5 prod:5"